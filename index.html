<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Admin - Full Panel</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        #sidebar { transition: 0.3s; z-index: 100; }
        .sidebar-open { left: 0 !important; }
        
        .sidebar-item { transition: 0.2s; cursor: pointer; border-radius: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .sidebar-item.active { background: #e11d48; color: white; box-shadow: 0 10px 15px -5px rgba(225, 29, 72, 0.3); }

        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 25px; }
        input, select { border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px; outline: none; width: 100%; transition: 0.2s; background: #fff; }
        input:focus { border-color: #e11d48; ring: 3px solid rgba(225, 29, 72, 0.1); }
        
        #login-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #e11d48; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- 1. LOGIN SCREEN -->
    <div id="login-overlay">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-sm text-center mx-4">
            <div class="w-16 h-16 bg-rose-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl">
                <i class="fas fa-user-shield text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Falcon Admin</h2>
            <input type="password" id="p-in" placeholder="PIN (9888)" class="text-center text-xl font-bold tracking-[8px] mb-8 border rounded-2xl p-4">
            <button onclick="login()" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-rose-700 transition-all">ENTER PANEL</button>
        </div>
    </div>

    <!-- 2. SIDEBAR -->
    <aside id="sidebar" class="fixed top-0 left-[-280px] md:left-0 w-[260px] h-full bg-slate-900 p-6 shadow-2xl flex flex-col">
        <div class="flex items-center justify-between mb-12 text-white">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-rose-600 rounded-lg flex items-center justify-center font-bold">F</div>
                <span class="font-black text-xl uppercase tracking-tighter italic">Falcon Admin</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="flex-1 space-y-2">
            <div onclick="tab('dash')" id="n-dash" class="sidebar-item p-4 flex items-center gap-3 active"><i class="fas fa-chart-pie w-5"></i> Overview</div>
            <div onclick="tab('mat')" id="n-mat" class="sidebar-item p-4 flex items-center gap-3"><i class="fas fa-trophy w-5"></i> Manage Matches</div>
            <div onclick="tab('bc')" id="n-bc" class="sidebar-item p-4 flex items-center gap-3"><i class="fas fa-satellite-dish w-5"></i> AI Broadcaster</div>
        </nav>

        <div onclick="logout()" class="sidebar-item p-4 flex items-center gap-3 text-rose-400 font-bold mt-auto"><i class="fas fa-power-off w-5"></i> Logout</div>
    </aside>

    <!-- 3. MAIN CONTENT -->
    <main class="flex-1 md:ml-[260px] p-6 md:p-12">
        <header class="md:hidden flex items-center gap-4 mb-8">
            <button onclick="toggleSidebar()" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-bars"></i></button>
            <h1 class="font-black text-slate-800 uppercase tracking-tighter">Falcon Dashboard</h1>
        </header>

        <!-- Tab: Overview -->
        <section id="tab-dash">
            <h1 class="text-3xl font-black mb-10 text-slate-800 tracking-tight">System Status</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-card flex items-center gap-6">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-2xl shadow-sm"><i class="fas fa-futbol"></i></div>
                    <div><p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Total Matches</p><h2 id="c-m" class="text-3xl font-black text-slate-800">0</h2></div>
                </div>
                <div class="glass-card flex items-center gap-6">
                    <div class="w-16 h-16 bg-rose-50 text-rose-600 rounded-3xl flex items-center justify-center text-2xl shadow-sm"><i class="fas fa-broadcast-tower"></i></div>
                    <div><p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Active Playlists</p><h2 id="c-l" class="text-3xl font-black text-slate-800">0</h2></div>
                </div>
            </div>
        </section>

        <!-- Tab: Matches (DRM Supported) -->
        <section id="tab-mat" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Matches</h1>
                <button onclick="openForm()" class="bg-rose-600 text-white px-8 py-3 rounded-2xl font-black shadow-lg hover:bg-rose-700 transition">+ ADD MATCH</button>
            </div>

            <div id="m-form" class="glass-card mb-12 hidden border-t-8 border-rose-600">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <input type="text" id="t1n" placeholder="Team 1 Name">
                    <input type="text" id="t1l" placeholder="Team 1 Logo URL">
                    <input type="text" id="t2n" placeholder="Team 2 Name">
                    <input type="text" id="t2l" placeholder="Team 2 Logo URL">
                    <input type="text" id="lt" placeholder="League Title">
                    <input type="text" id="ll" placeholder="League Logo URL">
                    <div><label class="text-[10px] font-bold text-slate-400 ml-2">START TIME</label><input type="datetime-local" id="ms"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 ml-2">END TIME</label><input type="datetime-local" id="me"></div>
                </div>
                <select id="sc" class="mb-8"><option value="FOOTBALL">FOOTBALL</option><option value="CRICKET">CRICKET</option></select>
                
                <h4 class="font-black text-slate-800 mb-4 uppercase text-[10px] tracking-widest border-b pb-2">Stream Servers (MPD/M3U8)</h4>
                <div id="s-list" class="space-y-4"></div>
                <button onclick="addS()" class="text-rose-600 font-bold text-xs mt-3 underline tracking-widest uppercase">+ Add Server</button>

                <div class="mt-12 flex gap-4">
                    <button onclick="saveMatch()" class="flex-1 bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest">Publish Match</button>
                    <button onclick="openForm(false)" class="px-8 font-bold text-slate-400">Cancel</button>
                </div>
            </div>

            <div class="glass-card overflow-hidden !p-0">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr><th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Match Information</th><th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Actions</th></tr>
                    </thead>
                    <tbody id="m-list-tbody"></tbody>
                </table>
            </div>
        </section>

        <!-- Tab: Broadcasters (AI Section Restored) -->
        <section id="tab-bc" class="hidden">
            <h1 class="text-3xl font-black mb-10 text-slate-800 tracking-tight">Broadcasting Channels</h1>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="glass-card h-fit border-t-8 border-blue-600">
                    <h3 class="font-black text-slate-800 mb-6 uppercase text-[10px] tracking-widest">AI Channel Generator</h3>
                    <div class="space-y-4 mb-6">
                        <div><label class="text-[10px] font-bold text-slate-400 ml-2 mb-1 block">MATCH NAME</label><input type="text" id="bc-match-name" placeholder="e.g. Argentina vs Brazil"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 ml-2 mb-1 block">LEAGUE NAME</label><input type="text" id="bc-league-name" placeholder="e.g. World Cup Qualifiers"></div>
                    </div>
                    <button onclick="aiFetchChannels()" id="ai-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg flex items-center justify-center gap-3 hover:bg-blue-700 transition">
                        <span id="ai-btn-txt"><i class="fas fa-wand-magic-sparkles mr-2"></i> Auto Fetch Channels</span>
                        <span id="ai-loader" class="loader hidden"></span>
                    </button>
                    <hr class="my-8 border-slate-100">
                    <h4 class="font-black text-slate-800 mb-4 uppercase text-[10px] tracking-widest">Result Channels</h4>
                    <div id="bc-rows-container"></div>
                    <button onclick="addBCField()" class="text-blue-600 font-bold text-xs mt-3 underline mb-10">+ ADD CHANNEL MANUALLY</button>
                    <button onclick="saveBCList()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest">Save Broadcasting List</button>
                </div>
                <div>
                    <h3 class="font-black text-slate-400 mb-6 uppercase text-[10px] tracking-widest">Active League Playlists</h3>
                    <div id="bc-active-container" class="space-y-4"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { apiKey: "AIzaSyBcROeTFNV6haP8ZrnIFH2iuC9oNS6Ccvc", authDomain: "live-bd-24.firebaseapp.com", databaseURL: "https://live-bd-24-default-rtdb.firebaseio.com", projectId: "live-bd-24", storageBucket: "live-bd-24.firebasestorage.app", messagingSenderId: "171477012668", appId: "1:171477012668:web:f2e694da9474ef236e40b9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() { if(document.getElementById('p-in').value === "1234") { document.getElementById('login-overlay').classList.add('hidden'); localStorage.setItem('falcon_session', 'ok'); } else alert("PIN Wrong!"); }
        if(localStorage.getItem('falcon_session') === 'ok') document.getElementById('login-overlay').classList.add('hidden');
        function logout() { localStorage.removeItem('falcon_session'); location.reload(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-open'); }

        function tab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('n-' + id).classList.add('active');
            if(window.innerWidth < 768) toggleSidebar();
        }

        // MATCH LOGIC WITH KEY-ID SUPPORT
        let editId = null;
        function openForm(show = true) { editId = null; document.getElementById('m-form').classList.toggle('hidden', !show); document.getElementById('s-list').innerHTML = ""; if(show) addS(); }

        function addS(n="", u="", kid="", key="") { 
            const d = document.createElement('div'); 
            d.className = "bg-slate-50 p-4 rounded-xl border border-slate-200 relative space-y-3"; 
            d.innerHTML = `
                <div class="flex gap-4">
                    <input type="text" class="sn flex-1" placeholder="Server Name" value="${n}">
                    <input type="text" class="su flex-[2]" placeholder="MPD/M3U8 Link" value="${u}">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" class="skid" placeholder="Key ID (ClearKey)" value="${kid}">
                    <input type="text" class="skey" placeholder="Key (ClearKey)" value="${key}">
                </div>
                <i class="fas fa-times text-red-500 cursor-pointer absolute top-2 right-3" onclick="this.parentElement.remove()"></i>
            `; 
            document.getElementById('s-list').appendChild(d); 
        }

        async function saveMatch() {
            const id = editId || Date.now();
            const ns = document.querySelectorAll('.sn'), us = document.querySelectorAll('.su'), kids = document.querySelectorAll('.skid'), keys = document.querySelectorAll('.skey');
            let streams = []; 
            ns.forEach((n, i) => { if(us[i].value) streams.push({ name: n.value, link: us[i].value, keyId: kids[i].value, key: keys[i].value }); });
            const data = { id, team1Name: document.getElementById('t1n').value, team1Logo: document.getElementById('t1l').value, team2Name: document.getElementById('t2n').value, team2Logo: document.getElementById('t2l').value, leagueTitle: document.getElementById('lt').value, leagueLogo: document.getElementById('ll').value, matchTime: document.getElementById('ms').value, matchEndTime: document.getElementById('me').value, sportType: document.getElementById('sc').value, streamLinks: streams };
            await db.ref('matches/'+id).set(data); alert("Match Saved!"); location.reload();
        }

        function editMatch(id) {
            db.ref('matches/'+id).once('value', snap => {
                const m = snap.val(); editId = id;
                document.getElementById('t1n').value = m.team1Name; document.getElementById('t1l').value = m.team1Logo;
                document.getElementById('t2n').value = m.team2Name; document.getElementById('t2l').value = m.team2Logo;
                document.getElementById('lt').value = m.leagueTitle; document.getElementById('ll').value = m.leagueLogo;
                document.getElementById('ms').value = m.matchTime; document.getElementById('me').value = m.matchEndTime;
                document.getElementById('sc').value = m.sportType;
                document.getElementById('s-list').innerHTML = ""; 
                if(m.streamLinks) m.streamLinks.forEach(l => addS(l.name, l.link, l.keyId || "", l.key || ""));
                document.getElementById('m-form').classList.remove('hidden'); window.scrollTo(0,0);
            });
        }

        // BROADCASTER LOGIC (RESTORED)
        function addBCField(n="", l="") {
            const d = document.createElement('div');
            d.className = "flex gap-2 mb-2 bg-slate-50 p-2 rounded-xl border border-slate-100 relative";
            d.innerHTML = `<input type="text" class="bn" placeholder="TV Channel" value="${n}"><input type="text" class="bl" placeholder="Logo URL" value="${l}"><i class="fas fa-times text-rose-500 p-2 cursor-pointer" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('bc-rows-container').appendChild(d);
        }

        async function aiFetchChannels() {
            const matchName = document.getElementById('bc-match-name').value;
            const leagueName = document.getElementById('bc-league-name').value;
            if(!matchName || !leagueName) return alert("Fill Match and League boxes!");
            const btnTxt = document.getElementById('ai-btn-txt'), loader = document.getElementById('ai-loader');
            btnTxt.classList.add('hidden'); loader.classList.remove('hidden');
            try {
                const res = await fetch("https://google.serper.dev/search", {
                    method: "POST",
                    headers: { "X-API-KEY": "d2dcfa24e51c108684d843ea059fded830538257", "Content-Type": "application/json" },
                    body: JSON.stringify({ q: `${matchName} ${leagueName} official broadcasters` })
                });
                const data = await res.json();
                const keys = ["Star Sports", "Sony Ten", "Sky Sports", "ESPN", "BeIN Sports", "SuperSport", "JioCinema", "T Sports", "GTV", "Ptv Sports"];
                const raw = JSON.stringify(data).toLowerCase();
                let found = []; keys.forEach(k => { if(raw.includes(k.toLowerCase())) found.push(k); });
                if(found.length > 0) {
                    document.getElementById('bc-rows-container').innerHTML = "";
                    [...new Set(found)].forEach(f => addBCField(f));
                } else alert("AI found nothing. Add manually.");
            } catch(e) { alert("AI Error!"); }
            finally { btnTxt.classList.remove('hidden'); loader.classList.add('hidden'); }
        }

        async function saveBCList() {
            const league = document.getElementById('bc-league-name').value;
            const names = document.querySelectorAll('.bn'), logos = document.querySelectorAll('.bl');
            let channels = []; names.forEach((n, i) => { if(n.value) channels.push({name: n.value, logo: logos[i].value}); });
            if(!league) return alert("League Name mandatory!");
            await db.ref(`league_playlists/FOOTBALL/${Date.now()}`).set({ league: league, channels: channels });
            alert("Saved!"); location.reload();
        }

        // LOAD DATA
        function load() {
            db.ref('matches').on('value', s => {
                const b = document.getElementById('m-list-tbody'); const data = s.val() || {}; b.innerHTML = "";
                document.getElementById('c-m').innerText = Object.keys(data).length;
                Object.values(data).forEach(m => { b.innerHTML += `<tr class="border-b hover:bg-slate-50 transition"><td class="p-6"><p class="font-bold text-slate-800 uppercase text-sm">${m.team1Name} vs ${m.team2Name}</p><span class="text-[9px] text-slate-400 font-bold uppercase">${m.leagueTitle}</span></td><td class="p-6 text-right flex justify-end gap-3"><button onclick="editMatch('${m.id}')" class="w-10 h-10 border rounded-xl flex items-center justify-center"><i class="fas fa-edit text-xs"></i></button><button onclick="del('matches/${m.id}')" class="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center"><i class="fas fa-trash text-xs"></i></button></td></tr>`; });
            });
            db.ref('league_playlists').on('value', s => {
                const b = document.getElementById('bc-active-container'); const data = s.val() || {}; b.innerHTML = "";
                let count = 0; Object.keys(data).forEach(sp => { Object.keys(data[sp]).forEach(id => {
                    const item = data[sp][id]; count++; b.innerHTML += `<div class="glass-card flex justify-between items-center border-l-8 border-rose-500"><div><h4 class="font-black text-slate-800 text-sm uppercase">${item.league}</h4><p class="text-[9px] font-bold text-rose-400 uppercase">${sp}</p></div><button onclick="del('league_playlists/${sp}/${id}')" class="text-rose-500"><i class="fas fa-trash-alt"></i></button></div>`;
                }); });
                document.getElementById('c-l').innerText = count;
            });
        }

        async function del(p) { if(confirm("Delete?")) await db.ref(p).remove(); }
        window.onload = () => { load(); addBCField(); tab('dash'); };
    </script>
</body>
</html>
